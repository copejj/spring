<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
	xmlns:layout="http://www.ultraq.net.nz"
	layout:decorate="~{layout/default}">
	<body>
        <div layout:fragment="content" class="mt-4"> 
            <!-- Alerts -->
            <div th:if="${saveError}" class="alert alert-danger" th:text="${saveError}"></div>
            <div th:if="${saveSuccess}" class="alert alert-success" th:text="${saveSuccess}"></div>

            <form th:action="@{/admin/users}" th:object="${user}" th:method="put" class="needs-validation">
                
                <!-- Row 1: User Info -->
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label for="userName" class="form-label" th:text="${labelSettings['username']}">user name</label>
                        <input th:field="*{userName}" type="text" class="form-control bg-light" readonly />
                    </div>

                    <div class="col-md-6">
                        <label for="email" class="form-label" th:text="${labelSettings['user_email']}">user email</label>
                        <input th:field="*{email}" type="text" class="form-control" />
                    </div>

                    <input th:field="*{userId}" type="hidden" />
                    
                    <div class="col-md-6">
                        <label for="firstName" class="form-label" th:text="${labelSettings['first_name']}">first name</label>
                        <input th:field="*{firstName}" type="text" class="form-control" />
                    </div>
                    
                    <div class="col-md-6">
                        <label for="lastName" class="form-label" th:text="${labelSettings['last_name']}">last name</label>
                        <input th:field="*{lastName}" type="text" class="form-control" />
                    </div>
                </div>

                <!-- Row 2: Password Section -->
                <hr class="my-4">
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label for="password" class="form-label" th:text="${labelSettings['change_password']}">change password</label>
                        <input th:field="*{passwordData.newPassword}" type="password" class="form-control" placeholder="Leave blank to keep current" />
                    </div>
                    
                    <div class="col-md-6">
                        <label for="confirmPassword" class="form-label" th:text="${labelSettings['confirm_password']}">confirm change</label>
                        <input th:field="*{passwordData.confirmPassword}" type="password" class="form-control" placeholder="Confirm new password" />
                    </div>
                </div>

                <div th:replace="~{fragments/user/admin-edit :: adminFields(userDto=${user})}"></div>

                <input type="hidden" name="_isAdmin" value="on"/>
                <input type="hidden" name="_canEdit" value="on"/>
                <input type="hidden" name="_isActive" value="on"/>

                <div th:replace="~{fragments/forms :: submit-save-cancel(cancelUrl=${isAdmin ? '/admin/users' : '/'})}"></div>
            </form>		
        </div>
	</body>
</html>
